<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="styles.css">
    <title>Lightbox Viewer</title>
</head>
<body>
<main>
  <h1 class="title">
    Museum Gallery
  </h1>
  
  <div class="gallery">

    <img class="gallery-item" src="https://cdn.freecodecamp.org/curriculum/labs/stonehenge-thumbnail.jpg" alt="picture">
    <img class="gallery-item" src="https://cdn.freecodecamp.org/curriculum/labs/storm-thumbnail.jpg" alt="picture">
    <img class="gallery-item" src="https://cdn.freecodecamp.org/curriculum/labs/trees-thumbnail.jpg" alt="picture">

  </div>

  <div id="lightbox-modal" class="lightbox-modal">
    <button id="close-btn" class="close-btn">
      &times;
    </button>
    <img id="lightbox-image" class="lightbox-image" src >
  </div>
</main>

<script src="main.js"></script>
</body>
</html>
